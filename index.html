<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Cloud Practitioner Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #f59e0b;
    --accent2: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #10b981;
    --red: #ef4444;
    --green-bg: rgba(16,185,129,0.12);
    --red-bg: rgba(239,68,68,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.08), transparent),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(245,158,11,0.05), transparent);
  }

  /* STICKY HEADER */
  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(16px, 4vw, 48px);
    height: 64px;
  }

  #header-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  #timer-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #timer-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  #timer {
    font-family: 'Space Mono', monospace;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 70px;
    text-align: right;
    transition: color 0.3s;
  }

  #timer.warning { color: var(--red); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  #progress-bar-wrap {
    position: sticky;
    top: 64px;
    z-index: 99;
    background: var(--bg);
    padding: 0;
  }
  #progress-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
    width: 0%;
  }

  /* MAIN */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: clamp(24px, 5vw, 56px) clamp(16px, 4vw, 32px);
  }

  /* INTRO */
  #intro {
    text-align: center;
    padding: 60px 20px;
  }
  #intro h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--accent);
    margin-bottom: 16px;
    line-height: 1.2;
  }
  #intro p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }
  #start-btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--accent);
    color: #0a0e1a;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.2s, transform 0.15s;
  }
  #start-btn:hover { background: #fbbf24; transform: translateY(-2px); }

  #start-ai-btn {
    display: inline-block;
    padding: 14px 40px;
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.2s, color 0.2s, transform 0.15s;
    position: relative;
  }
  #start-ai-btn:hover { background: var(--accent2); color: #fff; transform: translateY(-2px); }

  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    align-items: center;
  }

  .ai-badge {
    display: inline-block;
    font-size: 0.65rem;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent2);
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  /* QUESTIONS */
  #quiz-container { display: none; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: clamp(20px, 4vw, 36px);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), transparent);
    opacity: 0.5;
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.25);
    padding: 3px 10px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 3px;
    letter-spacing: 0.06em;
  }

  .q-text {
    font-size: clamp(0.9rem, 2vw, 1rem);
    line-height: 1.65;
    color: var(--text);
    font-weight: 400;
  }

  .multi-hint {
    font-size: 0.75rem;
    color: var(--accent2);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    padding: 4px 10px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 16px;
    font-family: 'Space Mono', monospace;
  }

  .answers-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .answer-option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
  .answer-option:hover:not(.disabled) {
    border-color: var(--accent2);
    background: rgba(59,130,246,0.07);
    transform: translateX(3px);
  }
  .answer-option.selected {
    border-color: var(--accent2);
    background: rgba(59,130,246,0.12);
  }

  .answer-option .marker {
    width: 20px;
    height: 20px;
    border: 2px solid var(--muted);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .answer-option.single-choice .marker { border-radius: 50%; }
  .answer-option.selected .marker {
    border-color: var(--accent2);
    background: var(--accent2);
    color: white;
  }

  .answer-option .answer-text {
    font-size: 0.9rem;
    line-height: 1.55;
    color: var(--text);
  }

  /* Result states */
  .answer-option.correct-selected {
    border-color: var(--green) !important;
    background: var(--green-bg) !important;
  }
  .answer-option.correct-selected .marker {
    border-color: var(--green) !important;
    background: var(--green) !important;
  }
  .answer-option.wrong-selected {
    border-color: var(--red) !important;
    background: var(--red-bg) !important;
  }
  .answer-option.wrong-selected .marker {
    border-color: var(--red) !important;
    background: var(--red) !important;
  }
  .answer-option.show-correct {
    border-color: var(--green) !important;
    background: var(--green-bg) !important;
  }
  .answer-option.show-correct .marker {
    border-color: var(--green) !important;
    background: var(--green) !important;
  }
  .answer-option.disabled { cursor: default; pointer-events: none; }

  .correct-hint {
    margin-top: 12px;
    font-size: 0.8rem;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
  }

  /* SUBMIT */
  #submit-section {
    display: flex;
    justify-content: center;
    margin: 36px 0;
  }

  #submit-btn {
    padding: 15px 52px;
    background: var(--accent);
    color: #0a0e1a;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 rgba(245,158,11,0);
  }
  #submit-btn:hover:not(:disabled) {
    background: #fbbf24;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(245,158,11,0.2);
  }
  #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* SCORE */
  #score-section {
    display: none;
    text-align: center;
    padding: 48px 20px;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  #score-display {
    font-family: 'Space Mono', monospace;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 12px;
  }
  #score-label {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 32px;
  }
  #score-message {
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 40px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  #retry-btn {
    padding: 13px 36px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.2s, color 0.2s;
  }
  #retry-btn:hover { background: var(--accent); color: #0a0e1a; }

  /* LOADING/ERROR */
  #loading, #error-msg {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
  }
  #error-msg { color: var(--red); }

  .dots::after {
    content: '';
    animation: dots 1.5s steps(4,end) infinite;
  }
  @keyframes dots {
    0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:'...'}
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* BACK BUTTON */
  #back-btn {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 8px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  #back-btn:hover { color: var(--text); border-color: var(--text); background: rgba(255,255,255,0.04); }
  #back-btn.visible { display: flex; }

  /* ── MOBILE ─────────────────────────────────────────────── */
  @media (max-width: 600px) {

    /* Header: shrink title, keep timer readable */
    #header { height: 56px; padding: 0 14px; gap: 8px; }
    #header-title { font-size: 0.65rem; letter-spacing: 0.06em; }
    #back-btn { font-size: 0.65rem; padding: 5px 9px 5px 7px; }
    #back-btn span { display: none; } /* icon only on mobile */
    #timer { font-size: 1.1rem; min-width: 56px; }
    #timer-label { display: none; }
    #progress-bar-wrap { top: 56px; }

    /* Main padding tighter */
    main { padding: 16px 12px 32px; }

    /* Intro */
    #intro { padding: 40px 8px; }
    #intro h1 { font-size: 1.9rem; }
    #intro p { font-size: 0.9rem; margin-bottom: 28px; }

    /* Buttons full-width on mobile */
    .btn-row { flex-direction: column; gap: 12px; width: 100%; }
    #start-btn, #start-ai-btn {
      width: 100%;
      padding: 16px 20px;
      font-size: 0.85rem;
      /* Remove angled clip-path on mobile — looks odd at full width */
      clip-path: none;
      border-radius: 4px;
    }

    /* Question cards */
    .question-card { padding: 16px 14px; margin-bottom: 16px; }
    .q-header { gap: 10px; margin-bottom: 14px; }
    .q-num { font-size: 0.7rem; padding: 2px 8px; }
    .q-text { font-size: 0.92rem; line-height: 1.6; }
    .multi-hint { font-size: 0.7rem; }

    /* Answer options — bigger tap targets, no slide-on-hover */
    .answer-option {
      padding: 14px 13px;
      gap: 11px;
      /* Active state instead of hover for touch */
      -webkit-tap-highlight-color: transparent;
    }
    .answer-option:hover:not(.disabled) {
      transform: none; /* disable slide on touch devices */
    }
    .answer-option:active:not(.disabled) {
      background: rgba(59,130,246,0.1);
      border-color: var(--accent2);
    }
    .answer-option .marker {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .answer-option .answer-text { font-size: 0.875rem; line-height: 1.5; }

    /* Submit button full-width */
    #submit-section { margin: 24px 0; }
    #submit-btn {
      width: 100%;
      padding: 16px 20px;
      clip-path: none;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Score section */
    #score-section { padding: 32px 8px; }
    #score-display { font-size: 4rem; }
    #score-message { font-size: 0.95rem; }
    #retry-btn {
      width: 100%;
      padding: 15px 20px;
      clip-path: none;
      border-radius: 4px;
    }
  }

  /* Touch devices — remove hover slide globally */
  @media (hover: none) {
    .answer-option:hover:not(.disabled) { transform: none; }
  }

  /* PAUSE BUTTON */
  #pause-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 5px 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  #pause-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(245,158,11,0.08); }
  #pause-btn.paused { color: var(--accent); border-color: var(--accent); background: rgba(245,158,11,0.1); }

  /* PAUSED BLUR OVERLAY */
  #quiz-blurred {
    /* no pointer-events restriction normally */
  }
  body.paused #quiz-blurred {
    filter: blur(6px);
    pointer-events: none;
    user-select: none;
  }
  #pause-overlay {
    display: none;
    position: fixed;
    top: 64px;
    left: 0; right: 0; bottom: 0;
    z-index: 90;
    background: rgba(10,14,26,0.5);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  body.paused #pause-overlay { display: flex; }
  #pause-overlay-text {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #pause-overlay-sub {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* COUNT PICKER MODAL */
  #count-modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(10,14,26,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #count-modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 36px 32px;
    text-align: center;
    max-width: 420px;
    width: 90%;
  }
  #count-modal-title {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #count-modal-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.06em;
  }
  #count-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .count-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 14px 8px 10px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .count-opt:hover { border-color: var(--accent); background: rgba(245,158,11,0.08); transform: translateY(-2px); color: var(--accent); }
  .count-min {
    font-size: 0.62rem;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .count-opt:hover .count-min { color: var(--accent); opacity: 0.7; }
  #count-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 24px;
    cursor: pointer;
    border-radius: 3px;
    transition: color 0.2s, border-color 0.2s;
  }
  #count-cancel:hover { color: var(--text); border-color: var(--text); }

</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:12px;min-width:0;">
    <button id="back-btn" onclick="retryQuiz()" style="display:none;" title="Back to home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Home</span>
    </button>
    <span id="header-title">☁ AWS Cloud Practitioner Quiz</span>
  </div>
  <div id="timer-wrap">
    <span id="timer-label">Time</span>
    <span id="timer">10:00</span>
    <button id="pause-btn" onclick="togglePause()" title="Pause timer" style="display:none;">
      <svg id="pause-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="2" width="4" height="12" rx="1" fill="currentColor"/>
        <rect x="9" y="2" width="4" height="12" rx="1" fill="currentColor"/>
      </svg>
      <svg id="play-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <path d="M4 2L14 8L4 14V2Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="pause-overlay">
  <div id="pause-overlay-text">⏸ Paused</div>
  <div id="pause-overlay-sub">Click resume to continue</div>
</div>

<div id="quiz-blurred">
<main>
  <div id="loading"><span class="dots">Loading questions</span></div>
  <div id="error-msg" style="display:none"></div>

  <div id="intro" style="display:none">
    <h1>AWS Cloud<br>Practitioner</h1>
    <p>Test your AWS knowledge. Choose how many questions you want — each question gives you 1 minute on the clock.</p>
    <div class="btn-row">
      <button id="start-btn" onclick="openCountPicker('pitanja.json')">Start Quiz</button>
      <button id="start-ai-btn" onclick="openCountPicker('pitanja2.json')">Start Quiz (AI Questions)<span class="ai-badge">✦ AI</span></button>
    </div>
  </div>


  <div id="quiz-container">
    <div id="questions-wrap"></div>
    <div id="submit-section">
      <button id="submit-btn" onclick="submitQuiz()" disabled>Submit Answers</button>
    </div>
  </div>

  <div id="score-section">
    <div id="score-display"></div>
    <div id="score-label">Correct Answers</div>
    <div id="score-message"></div>
    <button id="retry-btn" onclick="retryQuiz()">Try Again</button>
  </div>
</main>
</div><!-- /quiz-blurred -->

<script>
  let TOTAL_QUESTIONS = 10;
  let TIME_LIMIT = 10 * 60; // seconds — updated dynamically

  let allQuestions = [];
  let selectedQuestions = [];
  let userAnswers = {}; // { questionIndex: Set of selected answer texts }
  let timerInterval = null;
  let timeLeft = TIME_LIMIT;
  let submitted = false;
  let paused = false;
  let pendingFile = null; // file chosen before count picker

  // ── Load JSON ──────────────────────────────────────────────
  async function loadQuestions() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('intro').style.display = 'block';
  }

  // ── Shuffle & pick ─────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickQuestions() {
    // Shuffle creates a new array; slice guarantees unique subset — no repeats
    const shuffled = shuffle(allQuestions);
    const count = Math.min(TOTAL_QUESTIONS, shuffled.length);
    return shuffled.slice(0, count);
  }

  // ── Count Picker ───────────────────────────────────────────
  function openCountPicker(filename) {
    pendingFile = filename;
    document.getElementById('count-modal').style.display = 'flex';
  }

  function closeCountPicker() {
    pendingFile = null;
    document.getElementById('count-modal').style.display = 'none';
  }

  function confirmCount(count) {
    TOTAL_QUESTIONS = count;
    TIME_LIMIT = count * 60;
    document.getElementById('count-modal').style.display = 'none';
    startQuiz(pendingFile);
  }

  // ── Pause / Resume ──────────────────────────────────────────
  function togglePause() {
    if (submitted) return;
    paused = !paused;
    if (paused) {
      clearInterval(timerInterval);
      document.body.classList.add('paused');
      document.getElementById('pause-icon').style.display = 'none';
      document.getElementById('play-icon').style.display = '';
      document.getElementById('pause-btn').classList.add('paused');
      document.getElementById('pause-btn').title = 'Resume timer';
    } else {
      document.body.classList.remove('paused');
      document.getElementById('pause-icon').style.display = '';
      document.getElementById('play-icon').style.display = 'none';
      document.getElementById('pause-btn').classList.remove('paused');
      document.getElementById('pause-btn').title = 'Pause timer';
      // Resume countdown
      timerInterval = setInterval(() => {
        timeLeft--;
        renderTimer();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          if (!submitted) submitQuiz(true);
        }
      }, 1000);
    }
  }

  // ── Timer ──────────────────────────────────────────────────
  function startTimer() {
    timeLeft = TIME_LIMIT;
    renderTimer();
    paused = false;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      renderTimer();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!submitted) submitQuiz(true);
      }
    }, 1000);
  }

  function renderTimer() {
    const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const s = String(timeLeft % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = `${m}:${s}`;
    el.classList.toggle('warning', timeLeft <= 60);
  }

  // ── Build quiz UI ──────────────────────────────────────────
  async function startQuiz(filename) {
    // Load the chosen file
    try {
      const res = await fetch(filename);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allQuestions = data.questions;
    } catch(e) {
      alert(`Failed to load ${filename}. Make sure the file exists in the same folder.\n\n${e.message}`);
      return;
    }

    selectedQuestions = pickQuestions();
    userAnswers = {};
    submitted = false;

    document.getElementById('intro').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';
    document.getElementById('score-section').style.display = 'none';
    document.getElementById('submit-section').style.display = 'flex';

    renderQuestions();
    startTimer();
    updateProgress();
    document.getElementById('back-btn').classList.add('visible');
    document.getElementById('pause-btn').style.display = 'flex';
  }

  function renderQuestions() {
    const wrap = document.getElementById('questions-wrap');
    wrap.innerHTML = '';

    selectedQuestions.forEach((q, idx) => {
      const isMulti = q.correct_answers.length > 1;
      userAnswers[idx] = new Set();

      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `card-${idx}`;

      let html = `
        <div class="q-header">
          <span class="q-num">Q${idx + 1}</span>
          <span class="q-text">${escHtml(q.question_text)}</span>
        </div>`;

      if (isMulti) {
        html += `<div class="multi-hint">Select ${q.correct_answers.length} answers</div>`;
      }

      html += `<div class="answers-list" id="answers-${idx}">`;

      q.possible_answers.forEach((ans, aIdx) => {
        const cls = isMulti ? '' : ' single-choice';
        html += `
          <div class="answer-option${cls}" id="opt-${idx}-${aIdx}" onclick="toggleAnswer(${idx}, ${aIdx}, ${isMulti})">
            <div class="marker">${isMulti ? '' : ''}</div>
            <div class="answer-text">${escHtml(ans)}</div>
          </div>`;
      });

      html += `</div>`;
      card.innerHTML = html;
      wrap.appendChild(card);
    });

    updateSubmitBtn();
  }

  function toggleAnswer(qIdx, aIdx, isMulti) {
    if (submitted) return;
    const q = selectedQuestions[qIdx];
    const ans = q.possible_answers[aIdx];
    const set = userAnswers[qIdx];
    const optEl = document.getElementById(`opt-${qIdx}-${aIdx}`);

    if (isMulti) {
      if (set.has(ans)) {
        set.delete(ans);
        optEl.classList.remove('selected');
      } else {
        set.add(ans);
        optEl.classList.add('selected');
      }
    } else {
      // Radio: deselect all, select this
      const prev = [...set];
      set.clear();
      // remove selected from all options
      q.possible_answers.forEach((_, i) => {
        document.getElementById(`opt-${qIdx}-${i}`)?.classList.remove('selected');
      });
      if (!prev.includes(ans)) {
        set.add(ans);
        optEl.classList.add('selected');
      }
    }

    updateProgress();
    updateSubmitBtn();
  }

  function updateProgress() {
    const answered = Object.values(userAnswers).filter(s => s.size > 0).length;
    const pct = (answered / selectedQuestions.length) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function updateSubmitBtn() {
    const answered = Object.values(userAnswers).filter(s => s.size > 0).length;
    document.getElementById('submit-btn').disabled = answered < selectedQuestions.length;
  }

  // ── Submit ─────────────────────────────────────────────────
  function submitQuiz(timeUp = false) {
    if (submitted) return;
    submitted = true;
    clearInterval(timerInterval);

    let score = 0;

    selectedQuestions.forEach((q, idx) => {
      const selected = userAnswers[idx];
      const correct = new Set(q.correct_answers);
      const isCorrect = setsEqual(selected, correct);
      if (isCorrect) score++;

      const answersEl = document.getElementById(`answers-${idx}`);
      const opts = answersEl.querySelectorAll('.answer-option');

      opts.forEach((opt, aIdx) => {
        const ans = q.possible_answers[aIdx];
        opt.classList.add('disabled');

        const wasSelected = selected.has(ans);
        const isCorrectAns = correct.has(ans);

        if (wasSelected && isCorrectAns) {
          opt.classList.add('correct-selected');
          opt.querySelector('.marker').textContent = '✓';
        } else if (wasSelected && !isCorrectAns) {
          opt.classList.add('wrong-selected');
          opt.querySelector('.marker').textContent = '✗';
        } else if (!wasSelected && isCorrectAns) {
          opt.classList.add('show-correct');
          opt.querySelector('.marker').textContent = '✓';
        }
      });

      // Card border feedback
      const card = document.getElementById(`card-${idx}`);
      card.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
    });

    // Show score section below questions
    showScore(score, timeUp);
  }

  function setsEqual(a, b) {
    if (a.size !== b.size) return false;
    for (const v of a) if (!b.has(v)) return false;
    return true;
  }

  function showScore(score, timeUp) {
    const total = selectedQuestions.length;
    const pct = Math.round((score / total) * 100);

    const scoreEl = document.getElementById('score-section');
    const display = document.getElementById('score-display');
    const msg = document.getElementById('score-message');

    display.textContent = `${score}/${total}`;

    let color, message;
    if (pct >= 80) {
      color = 'var(--green)';
      message = timeUp
        ? `Time's up! Still, ${pct}% is excellent. You clearly know your AWS.`
        : `Outstanding! ${pct}% — you're well-prepared for the exam.`;
    } else if (pct >= 60) {
      color = 'var(--accent)';
      message = timeUp
        ? `Time's up — but ${pct}% shows solid knowledge. Keep studying!`
        : `Good effort! ${pct}% — review the highlighted questions and try again.`;
    } else {
      color = 'var(--red)';
      message = timeUp
        ? `Time's up. ${pct}% — more practice will help. Review the answers below.`
        : `${pct}% — don't give up! Check the correct answers highlighted below.`;
    }

    display.style.color = color;
    msg.textContent = message;
    if (timeUp) {
      const note = document.createElement('p');
      note.style.cssText = 'color: var(--red); font-size:0.8rem; margin-top:8px; font-family: Space Mono, monospace;';
      note.textContent = '⏱ Time expired';
      msg.after(note);
    }

    // Scroll to score if needed, then show inline
    document.getElementById('submit-section').style.display = 'none';
    scoreEl.style.display = 'block';
    scoreEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Retry ──────────────────────────────────────────────────
  function retryQuiz() {
    clearInterval(timerInterval);
    submitted = false;
    paused = false;
    document.body.classList.remove('paused');
    document.getElementById('score-section').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('submit-section').style.display = 'flex';
    document.getElementById('progress-bar').style.width = '0%';
    const el = document.getElementById('timer');
    el.classList.remove('warning');
    el.textContent = '10:00';
    document.getElementById('intro').style.display = 'block';
    document.getElementById('back-btn').classList.remove('visible');
    document.getElementById('pause-btn').style.display = 'none';
    document.getElementById('pause-icon').style.display = '';
    document.getElementById('play-icon').style.display = 'none';
    document.getElementById('pause-btn').classList.remove('paused');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Utils ──────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Fix scoping bug: qIdx used incorrectly in submitQuiz, fixed below
  // Actually rewrite submitQuiz properly:
  // (already using idx correctly above, the line with qIdx was a leftover placeholder — safe to ignore)

  loadQuestions();
</script>

<!-- Question count picker modal — outside blur wrapper so it's always clickable -->
<div id="count-modal" style="display:none;">
  <div id="count-modal-box">
    <div id="count-modal-title">How many questions?</div>
    <div id="count-modal-sub">1 minute per question</div>
    <div id="count-options">
      <button class="count-opt" onclick="confirmCount(10)">10<span class="count-min">10 min</span></button>
      <button class="count-opt" onclick="confirmCount(20)">20<span class="count-min">20 min</span></button>
      <button class="count-opt" onclick="confirmCount(30)">30<span class="count-min">30 min</span></button>
      <button class="count-opt" onclick="confirmCount(40)">40<span class="count-min">40 min</span></button>
      <button class="count-opt" onclick="confirmCount(50)">50<span class="count-min">50 min</span></button>
      <button class="count-opt" onclick="confirmCount(60)">60<span class="count-min">60 min</span></button>
    </div>
    <button id="count-cancel" onclick="closeCountPicker()">Cancel</button>
  </div>
</div>
</body>
</html>
